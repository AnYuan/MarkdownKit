name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Xcode version
        run: xcodebuild -version

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Fast verification (non-snapshot suites)
        run: bash scripts/verify_fast.sh

      - name: Snapshot stability (record then verify)
        run: |
          # Delete local baselines so SnapshotTesting records fresh ones for this environment
          rm -rf Tests/MarkdownKitTests/__Snapshots__/SnapshotTests/*.png
          # First run: records baselines (fails with "no reference found" — expected)
          swift test --filter "SnapshotTests" 2>&1 || true
          # Second run: verifies against just-recorded baselines from the same environment
          swift test --filter "SnapshotTests"
