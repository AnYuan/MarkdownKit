name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Xcode version
        run: xcodebuild -version

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Fast verification (discovery-driven correctness gate)
        run: bash scripts/verify_fast.sh

      - name: Snapshot stability (record then verify)
        run: |
          # Delete local baselines so SnapshotTesting records fresh ones for this environment
          rm -rf Tests/MarkdownKitTests/__Snapshots__/SnapshotTests/*.png
          # Anchored to the exact SnapshotTests/iOSSnapshotTests classes only - a bare
          # "SnapshotTests" filter would also substring-match DiagramSnapshotTests,
          # which is a deterministic correctness suite already covered above by
          # verify_fast.sh and must not be re-recorded/re-verified here.
          SNAPSHOT_FILTER='^MarkdownKitTests\.(SnapshotTests|iOSSnapshotTests)/'
          # First run: records baselines (fails with "no reference found" - expected)
          swift test --filter "$SNAPSHOT_FILTER" 2>&1 || true
          # Second run: verifies against just-recorded baselines from the same environment
          swift test --filter "$SNAPSHOT_FILTER"

  verify-ios:
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Xcode version
        run: xcodebuild -version

      - name: iOS Simulator correctness lane
        run: bash scripts/verify_ios.sh
